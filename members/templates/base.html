{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Indiemusi.ch{% endblock %}</title>
    <!-- Add any meta tags, CSS links, or other header elements here -->
     <link rel="stylesheet" href="{% static 'css/indiemusich.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="{% url 'home_page' %}" class="text-xl font-bold text-gray-800 hover:text-blue-600">
                        Indiemusi.ch
                    </a>
                </div>
                <div class="flex space-x-4">
                    <a href="{% url 'home_page' %}" 
                       class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-blue-600 hover:bg-gray-50">
                        Home
                    </a>
                    <a href="{% url 'members_list' %}" 
                       class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-blue-600 hover:bg-gray-50">
                        Members
                    </a>
                     <a href="{% url 'links_list' %}" 
                       class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-blue-600 hover:bg-gray-50">
                        Resources
                    </a>
                     <a href="{% url 'about_page' %}" 
                       class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-blue-600 hover:bg-gray-50">
                        About
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main role="main">
        <div class="container mx-auto px-4">
            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 mb-4" role="alert">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% block content %}
            <!-- Content goes here -->
            {% endblock %}
        </div>
    </main>

    <footer class="footer mt-auto py-3">
        <!-- Your footer content here -->
    </footer>
</body>
</html>
