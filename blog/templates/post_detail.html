{% extends "base.html" %}

{% block title %}{{ post.title }} | Indiemusi.ch{% endblock %}

{% block content %}
<div class="container mx-auto max-w-2xl px-4 py-10">
    <h1 class="text-3xl font-bold mb-2">{{ post.title }}</h1>
    <p class="text-gray-500 text-sm mb-8">
        {{ post.created_at|date:"F j, Y" }}
    </p>
    <div class="prose prose-lg max-w-none">
        {{ post.formatted_content|safe }}
    </div>
    <div class="mt-8">
        <a href="{% url 'home_page' %}" class="text-blue-600 hover:text-blue-800 hover:underline">&larr; Back to Home</a>
    </div>
</div>
{% endblock %}
